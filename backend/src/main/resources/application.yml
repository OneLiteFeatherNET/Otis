micronaut:
  serde:
    jackson:
      parser-features:
  application:
    name: Otis API

# Datasource
datasources:
  default:
    url: ${JDBC_URL:`jdbc:mariadb://127.0.0.1:3336/otis`}
    password: ${JDBC_PASSWORD:`otis`}
    username: ${JDBC_USER:`root`}
    driver-class-name: ${JDBC_DRIVER:`org.mariadb.jdbc.Driver`}
# JPA
jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: false

# OpenTelemetry — tracing is disabled unless OTEL_TRACES_EXPORTER=otlp is set
# (do this in the Docker/prod container). Metrics stay on Prometheus/Micrometer.
otel:
  service:
    name: ${OTEL_SERVICE_NAME:otis}
  traces:
    exporter: ${OTEL_TRACES_EXPORTER:none}
  metrics:
    exporter: none
  logs:
    exporter: none
  exporter:
    otlp:
      protocol: grpc
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:`http://localhost:4317`}
  exclusions:
    - /health
    - /health/.*
    - /prometheus
    - /swagger
    - /swagger/.*
    - /swagger-ui/.*

# OpenAPI
router:
  static-resources:
    swagger:
      paths: classpath:META-INF/swagger
      mapping: /swagger/**
    swagger-ui:
      paths: classpath:META-INF/swagger/views/swagger-ui
      mapping: /swagger-ui/**