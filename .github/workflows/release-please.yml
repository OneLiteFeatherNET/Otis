name: release-please
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      docker_version:
        description: "Version to (re)build & push the Docker image for, e.g. 1.13.2 (no leading v). Runs only the docker job."
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: OneLiteFeatherNET/workflows/.github/workflows/gradle-publish.yml@v2.1.0
    with:
      java-version: "25.0.3"
      java-distribution: "temurin"
    secrets: inherit

  docker:
    name: Build Docker Artifacts
    runs-on: ubuntu-latest
    needs: release-please
    # Runs on a real release, or on a manual dispatch to (re)publish a given version.
    if: |
      always() &&
      ((github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') ||
       github.event_name == 'workflow_dispatch')
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.docker_version || needs.release-please.outputs.version }}
      # Internal Harbor endpoint reached over the WARP private network — NOT the
      # public Cloudflare tunnel host, so there is no 100 MB body cap and no need
      # to chunk uploads. The image is pushed with a plain buildx push.
      IMAGE: ${{ secrets.HARBOR_INTERNAL_REGISTRY }}/otis/otis
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build Docker Artifacts
        run: ./gradlew jar optimizedBuildLayers optimizedDockerfile -Pversion=${VERSION}
      - name: Connect Cloudflare WARP
        # Enrolls the runner into Zero Trust as a service so Harbor is reachable
        # via the tunnel's private network route instead of the public HTTP proxy.
        uses: Boostport/setup-cloudflare-warp@v1
        with:
          organization: ${{ secrets.CF_WARP_ORG }}
          auth_client_id: ${{ secrets.CF_WARP_CLIENT_ID }}
          auth_client_secret: ${{ secrets.CF_WARP_CLIENT_SECRET }}
          # Tunnel virtual network that carries Harbor's private network route.
          vnet: ${{ secrets.CF_WARP_VNET }}
          configure_docker_dns: true
      - name: Debug internal connectivity
        # Temporary: pinpoints whether the internal Harbor host fails on DNS or routing over WARP.
        continue-on-error: true
        env:
          HOST: ${{ secrets.HARBOR_INTERNAL_REGISTRY }}
        run: |
          echo "--- warp status ---"; warp-cli --accept-tos status || true
          echo "--- warp settings (split tunnel / routes) ---"; warp-cli --accept-tos settings 2>/dev/null | head -40 || true
          echo "--- DNS resolve ${HOST} ---"; getent hosts "${HOST}" || nslookup "${HOST}" || true
          echo "--- curl https://${HOST}/v2/ ---"; curl -sv --max-time 15 "https://${HOST}/v2/" 2>&1 | head -30 || true
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.VERSION }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.VERSION }}
            type=semver,pattern={{major}},value=${{ env.VERSION }}
            type=sha
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to internal Harbor
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.HARBOR_INTERNAL_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./backend/build/docker/optimized
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Sign image with a key
        run: |
          # All tags share one manifest digest, so a single signature covers them all.
          cosign sign --yes --registry-username='${{ secrets.HARBOR_USERNAME }}' --registry-password='${{ secrets.HARBOR_PASSWORD }}' --key env://COSIGN_PRIVATE_KEY "${IMAGE}@${DIGEST}"
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          DIGEST: ${{ steps.build.outputs.digest }}
